# New API Configuration for kejilion/apps
# Official: https://github.com/QuantumNous/new-api
# 新一代 LLM 网关与 AI 资产管理系统，支持多渠道聚合、令牌分发与配额管理

local app_id="new-api"
local app_name="New API"
local app_text="AI API 聚合网关与资管平台，支持多渠道分发、令牌管理与配额控制"
local app_url="https://github.com/QuantumNous/new-api"
local docker_name="new-api"
local docker_port="3000"
local app_size="2"

docker_app_install() {
    mkdir -p /home/docker/new-api && cd /home/docker/new-api

    cat <<YML > docker-compose.yml
services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: unless-stopped
    ports:
      - "${docker_port}:3000"
    volumes:
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
YML

    docker compose up -d

    # 等待服务就绪
    echo "正在启动 New API..."
    for i in $(seq 1 15); do
        sleep 2
        if curl -s -o /dev/null -w '' --max-time 3 http://127.0.0.1:${docker_port}/ 2>/dev/null; then
            break
        fi
    done

    echo ""
    echo "========================================"
    echo "  New API 安装完成！"
    echo "========================================"
    check_docker_app_ip
    echo "  访问地址：http://<IP>:${docker_port}"
    echo "  默认账号：root"
    echo "  默认密码：123456"
    echo "  请登录后立即修改密码！"
    echo "  数据目录：/home/docker/new-api/data"
    echo "========================================"
    echo ""
}

docker_app_update() {
    cd /home/docker/new-api || { echo "目录不存在"; return 1; }
    docker compose pull
    docker compose up -d
    echo "New API 已更新至最新版本。"
}

docker_app_uninstall() {
    cd /home/docker/new-api || { echo "目录不存在"; return 1; }
    docker compose down --rmi all
    cd .. && rm -rf new-api
    echo "New API 已彻底卸载。"
}

# 注册到平台
docker_app_plus
