# Next Terminal Configuration for kejilion/apps
# Official: https://github.com/dushixiang/next-terminal
# Docs: https://docs.next-terminal.typesafe.cn

local app_id="next-terminal"
local app_name="Next Terminal"
local app_text="Web 运维审计堡垒机，支持 SSH、RDP、VNC 等协议"
local app_url="https://github.com/dushixiang/next-terminal"
local docker_name="next-terminal"
local docker_port="8088"
local app_size="2"

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    local app_dir="/home/docker/next-terminal"
    local postgres_password

    mkdir -p "${app_dir}/data/postgresql" "${app_dir}/logs"
    cd "${app_dir}" || return 1

    if [ ! -f .env ]; then
        postgres_password=$(openssl rand -hex 24 2>/dev/null || head /dev/urandom | tr -dc A-Za-z0-9 | head -c 32)
        cat <<ENV > .env
POSTGRES_DB=next-terminal
POSTGRES_USER=next-terminal
POSTGRES_PASSWORD=${postgres_password}
TZ=Asia/Shanghai
ENV
    else
        postgres_password=$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)
    fi

    cat <<'YAML' > docker-compose.yml
services:
  guacd:
    image: dushixiang/guacd:latest
    container_name: next-terminal-guacd
    restart: always
    volumes:
      - ./data:/usr/local/next-terminal/data

  postgresql:
    image: postgres:16.4
    container_name: next-terminal-postgresql
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data

  next-terminal:
    image: dushixiang/next-terminal:latest
    container_name: next-terminal
    restart: always
    depends_on:
      - postgresql
      - guacd
    ports:
      - "8088:8088"
      - "2022:2022"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data:/usr/local/next-terminal/data
      - ./logs:/usr/local/next-terminal/logs
      - ./config.yaml:/etc/next-terminal/config.yaml
YAML

    cat <<'YAML' > config.yaml
Database:
  Enabled: true
  Type: postgres
  Postgres:
    Hostname: postgresql
    Port: 5432
    Username: next-terminal
    Password: next-terminal
    Database: next-terminal
  ShowSql: false
log:
  Level: info
  Filename: ./logs/nt.log

Server:
  Addr: "0.0.0.0:8088"

App:
  Website:
    AccessLog: "./logs/access.log"
  Recording:
    Type: "local"
    Path: "/usr/local/next-terminal/data/recordings"
  Guacd:
    Drive: "/usr/local/next-terminal/data/drive"
    Hosts:
      - Hostname: guacd
        Port: 4822
        Weight: 1
  ReverseProxy:
    Enabled: false
    HttpEnabled: true
    HttpAddr: ":80"
    HttpRedirectToHttps: false
    HttpsEnabled: true
    HttpsAddr: ":443"
    SelfProxyEnabled: true
    SelfDomain: "nt.yourdomain.com"
    Root: ""
    IpExtractor: "direct"
    IpTrustList:
      - "0.0.0.0/0"
YAML

    sed -i "s/\"8088:8088\"/\"${docker_port}:8088\"/g" docker-compose.yml
    sed -i "s/Password: next-terminal/Password: ${postgres_password}/g" config.yaml

    docker compose --env-file .env up -d

    echo "Next Terminal 已部署完成！"
    check_docker_app_ip
    echo "初始化地址：http://服务器IP:${docker_port}/setup"
    echo "登录地址：http://服务器IP:${docker_port}/login"
    echo "可选 SSH 服务端口：2022"
    echo "数据库密码已保存：${app_dir}/.env"
    echo "配置文件：${app_dir}/config.yaml"
}

docker_app_update() {
    local app_dir="/home/docker/next-terminal"
    cd "${app_dir}" || return 1
    docker compose --env-file .env pull
    docker compose --env-file .env up -d
    echo "Next Terminal 已更新完成。"
}

docker_app_uninstall() {
    local app_dir="/home/docker/next-terminal"
    cd "${app_dir}" || return 1
    docker compose --env-file .env down --rmi all
    rm -rf "${app_dir}"
    echo "Next Terminal 已彻底卸载，包括配置、日志与数据。"
}

# --- 注册 / Registration ---
docker_app_plus
