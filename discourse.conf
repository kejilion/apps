# Discourse Configuration for kejilion/apps
# Official install doc: https://github.com/discourse/discourse/blob/main/docs/INSTALL.md
# Docker runtime: https://github.com/discourse/discourse_docker

local app_id="discourse"
local app_name="Discourse"
local app_text="开源社区论坛与知识讨论平台"
local app_url="https://github.com/discourse/discourse"
local docker_name="app"
local docker_port="8080"
local app_size="10"

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    local app_dir="/home/docker/discourse"
    local discourse_dir="${app_dir}/discourse_docker"
    local server_ip
    server_ip=$(curl -s4 ip.sb 2>/dev/null || curl -s4 ifconfig.me 2>/dev/null || hostname -I 2>/dev/null | awk '{print $1}')
    [ -n "${server_ip}" ] || server_ip="127.0.0.1"

    mkdir -p "${app_dir}"
    cd "${app_dir}" || return 1

    if [ ! -d "${discourse_dir}/.git" ]; then
        rm -rf "${discourse_dir}"
        git clone "${gh_proxy}https://github.com/discourse/discourse_docker.git" "${discourse_dir}" || git clone https://github.com/discourse/discourse_docker.git "${discourse_dir}"
    fi

    cd "${discourse_dir}" || return 1
    mkdir -p containers shared/standalone shared/standalone/log/var-log

    local secret_key_base
    if [ -f "${app_dir}/.env" ]; then
        # shellcheck disable=SC1091
        . "${app_dir}/.env"
    fi
    if [ -z "${SECRET_KEY_BASE:-}" ]; then
        secret_key_base=$(openssl rand -hex 64 2>/dev/null || head /dev/urandom | tr -dc A-Fa-f0-9 | head -c 128)
        cat > "${app_dir}/.env" <<ENV
SECRET_KEY_BASE=${secret_key_base}
ENV
    else
        secret_key_base="${SECRET_KEY_BASE}"
    fi

    cat > containers/app.yml <<YML
## Discourse standalone container for kejilion/apps
## IP + port access mode: http://${server_ip}:${docker_port}
templates:
  - "templates/postgres.template.yml"
  - "templates/redis.template.yml"
  - "templates/web.template.yml"
  - "templates/web.ratelimited.template.yml"

expose:
  - "${docker_port}:80"

params:
  db_default_text_search_config: "pg_catalog.english"
  db_shared_buffers: "128MB"
  upload_size: 20m

env:
  LANG: en_US.UTF-8
  UNICORN_WORKERS: 2
  DISCOURSE_HOSTNAME: ${server_ip}
  DISCOURSE_PORT: ${docker_port}
  DISCOURSE_DEVELOPER_EMAILS: admin@${server_ip}.nip.io
  DISCOURSE_DEFAULT_LOCALE: zh_CN
  ## Keep this flag for official bootstrap when SMTP is not configured.
  ## The app disables Discourse ID after boot so first login can use local accounts.
  DISCOURSE_SKIP_EMAIL_SETUP: 1
  DISCOURSE_SECRET_KEY_BASE: ${secret_key_base}
  DISCOURSE_FORCE_HTTPS: false

volumes:
  - volume:
      host: /home/docker/discourse/discourse_docker/shared/standalone
      guest: /shared
  - volume:
      host: /home/docker/discourse/discourse_docker/shared/standalone/log/var-log
      guest: /var/log

hooks:
  after_code:
    - exec:
        cd: \$home/plugins
        cmd:
          - git clone https://github.com/discourse/docker_manager.git
  after_web_config:
    - replace:
        filename: /etc/nginx/conf.d/discourse.conf
        from: "server_name _ ;"
        to: "server_name _ ${server_ip};"
    - exec:
        cmd:
          - echo "port = '${docker_port}'" >> /var/www/discourse/config/discourse.conf
          - echo "force_https = 'false'" >> /var/www/discourse/config/discourse.conf
YML

    echo "正在构建 Discourse，首次安装通常需要 5-20 分钟..."
    if ! ./launcher rebuild app; then
        echo "Discourse 构建失败，请查看上方日志。"
        return 1
    fi

    echo "正在切换为本地账号登录模式并设置中文界面..."
    docker exec app bash -lc "cd /var/www/discourse && rails runner \"SiteSetting.enable_discourse_id=false; SiteSetting.enable_local_logins=true; SiteSetting.auth_overrides_username=false; SiteSetting.has_login_hint=false; SiteSetting.default_locale='zh_CN'; SiteSetting.allow_user_locale=true; SiteSetting.global_notice=''\"" || true

    echo ""
    echo "========================================"
    echo "  Discourse 安装完成"
    echo "========================================"
    echo "  访问地址: http://${server_ip}:${docker_port}"
    echo "  数据目录: ${app_dir}"
    echo "  管理命令: cd ${discourse_dir} && ./launcher COMMAND app"
    echo "  更新命令: cd ${discourse_dir} && ./launcher rebuild app"
    echo ""
    echo "  当前为 IP + 端口访问方案，已启用本地账号登录，默认中文界面。"
    echo "  首个管理员可通过容器内命令创建："
    echo "  cd ${discourse_dir} && ./launcher enter app rake admin:create"
    echo "  如需生产环境，建议后续绑定域名、配置 HTTPS 和 SMTP。"
    echo "========================================"
    echo ""

    check_docker_app_ip
}

docker_app_update() {
    local app_dir="/home/docker/discourse"
    local discourse_dir="${app_dir}/discourse_docker"
    cd "${discourse_dir}" || return 1
    git pull
    ./launcher rebuild app
    echo "Discourse 已更新完成。"
}

docker_app_uninstall() {
    local app_dir="/home/docker/discourse"
    local discourse_dir="${app_dir}/discourse_docker"
    if [ -d "${discourse_dir}" ]; then
        cd "${discourse_dir}" || return 1
        ./launcher destroy app || true
        ./launcher cleanup || true
    fi
    docker rm -f discourse-app 2>/dev/null || true
    rm -rf "${app_dir}"
    echo "Discourse 已彻底卸载，包括配置、上传文件、数据库与日志。"
}

# --- 注册 (必须包含) / Registration (Mandatory) ---
docker_app_plus
