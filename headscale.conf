# Headscale Configuration for kejilion/apps
# Official: https://github.com/juanfont/headscale
# Self-hosted Tailscale control server, WireGuard mesh VPN

# --- 基础信息 / Basic Information ---
local app_id="headscale"
local app_name="Headscale"
local app_text="自托管 Tailscale 控制服务器，基于 WireGuard 的 Mesh VPN 组网"
local app_url="https://github.com/juanfont/headscale"
local docker_name="headscale"
local docker_port="${docker_port:-8080}"
local app_size="1"

# --- 核心逻辑 / Core Logic ---
docker_app_install() {
    local app_dir="/home/docker/headscale"
    mkdir -p "${app_dir}/config" "${app_dir}/lib"
    cd "${app_dir}" || return 1

    # 下载官方示例配置文件
    curl -L -o config/config.yaml "${gh_proxy}https://raw.githubusercontent.com/juanfont/headscale/main/config-example.yaml"

    # 获取服务器公网 IP 用于 server_url
    local server_ip
    server_ip=$(curl -s4 ip.sb 2>/dev/null || curl -s4 ifconfig.me 2>/dev/null || echo "127.0.0.1")

    # 修改关键配置项
    sed -i "s|server_url: http://127.0.0.1:8080|server_url: http://${server_ip}:${docker_port}|g" config/config.yaml
    sed -i "s|listen_addr: 127.0.0.1:8080|listen_addr: 0.0.0.0:8080|g" config/config.yaml
    sed -i "s|metrics_listen_addr: 127.0.0.1:9090|metrics_listen_addr: 0.0.0.0:9090|g" config/config.yaml
    sed -i "s|grpc_listen_addr: 127.0.0.1:50443|grpc_listen_addr: 0.0.0.0:50443|g" config/config.yaml

    # 生成 docker-compose.yml
    cat > docker-compose.yml <<YML
services:
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: unless-stopped
    ports:
      - "${docker_port}:8080"
      - "9090:9090"
    volumes:
      - ${app_dir}/config:/etc/headscale:ro
      - ${app_dir}/lib:/var/lib/headscale
    read_only: true
    tmpfs:
      - /var/run/headscale
    command: serve
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
YML

    docker compose up -d

    echo ""
    echo "========================================"
    echo "  Headscale 安装完成 / Install Complete"
    echo "========================================"
    echo "  API 地址: http://${server_ip}:${docker_port}"
    echo "  Metrics:  http://${server_ip}:9090/metrics"
    echo ""
    echo "  配置文件: ${app_dir}/config/config.yaml"
    echo "  数据目录: ${app_dir}/lib"
    echo "========================================"
    echo ""
    echo "  快速上手:"
    echo "  1. 创建用户:"
    echo "     docker exec headscale headscale users create myuser"
    echo ""
    echo "  2. 查看用户ID:"
    echo "     docker exec headscale headscale users list"
    echo ""
    echo "  3. 生成预认证密钥 (USER_ID替换为上一步的数字ID):"
    echo "     docker exec headscale headscale preauthkeys create --user USER_ID"
    echo ""
    echo "  4. 客户端连接 (在其他机器上):"
    echo "     tailscale up --login-server=http://${server_ip}:${docker_port} --authkey=YOUR_KEY"
    echo ""
    echo "  提示: 生产环境建议配置域名 + HTTPS 反代"
    echo "========================================"
    echo ""

    check_docker_app_ip
}

docker_app_update() {
    cd /home/docker/headscale || return 1
    docker compose pull
    docker compose up -d
    echo "更新完成 / Update Complete"
}

docker_app_uninstall() {
    cd /home/docker/headscale || return 1
    docker compose down --rmi all
    rm -rf /home/docker/headscale
    echo "卸载完成 / Uninstall Complete"
}

# --- 注册 (必须包含) / Registration (Mandatory) ---
docker_app_plus
